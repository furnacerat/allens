<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1E3A5F">
    <title>Allen's Contractor's</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="app">
        <!-- Desktop Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚒</span>
                    <span class="logo-text">Allen's<br>Contractor's</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" data-view="dashboard">
                    <span class="nav-icon">▣</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="jobs">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Jobs</span>
                </a>
                <a href="#" class="nav-item" data-view="estimates">
                    <span class="nav-icon">📐</span>
                    <span class="nav-label">Estimates</span>
                </a>
                <a href="#" class="nav-item" data-view="library">
                    <span class="nav-icon">📚</span>
                    <span class="nav-label">Cost Library</span>
                </a>
                <a href="#" class="nav-item" data-view="templates">
                    <span class="nav-icon">📄</span>
                    <span class="nav-label">Templates</span>
                </a>
                <a href="#" class="nav-item" data-view="assemblies">
                    <span class="nav-icon">📦</span>
                    <span class="nav-label">Assemblies</span>
                </a>
                <a href="#" class="nav-item" data-view="changeorders">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-label">Change Orders</span>
                </a>
                <a href="#" class="nav-item" data-view="photnotes">
                    <span class="nav-icon">📷</span>
                    <span class="nav-label">Photo Notes</span>
                </a>
                <a href="#" class="nav-item" data-view="subbids">
                    <span class="nav-icon">🏗</span>
                    <span class="nav-label">Sub Bids</span>
                </a>
                <a href="#" class="nav-item" data-view="jobcosts">
                    <span class="nav-icon">💰</span>
                    <span class="nav-label">Job Costs</span>
                </a>
                <a href="#" class="nav-item" data-view="invoices">
                    <span class="nav-icon">📄</span>
                    <span class="nav-label">Invoices</span>
                </a>
                <a href="#" class="nav-item" data-view="contracts">
                    <span class="nav-icon">📜</span>

                </a>
                <a href="#" class="nav-item" data-view="warranties">
                    <span class="nav-icon">🛡</span>
                    <span class="nav-label">Warranties</span>
                </a>
                <a href="#" class="nav-item" data-view="punchlists">
                    <span class="nav-icon">✓</span>
                    <span class="nav-label">Punch Lists</span>
                </a>
                <a href="#" class="nav-item" data-view="materials">
                    <span class="nav-icon">🛒</span>
                    <span class="nav-label">Materials</span>
                </a>
                <a href="#" class="nav-item" data-view="settings">
                    <span class="nav-icon">⚙</span>
                    <span class="nav-label">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="main" class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
                <h1 id="page-title" class="page-title">Dashboard</h1>
                <button id="quick-add" class="quick-add-btn" aria-label="Quick add">+</button>
            </header>
            <div id="content" class="content-area">
                <!-- Views rendered here -->
            </div>
        </main>

        <!-- Mobile Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <a href="#" class="nav-item" data-view="dashboard">
                <span class="nav-icon">▣</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="#" class="nav-item" data-view="jobs">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Jobs</span>
            </a>
            <a href="#" class="nav-item" data-view="estimates">
                <span class="nav-icon">📐</span>
                <span class="nav-label">Estimates</span>
            </a>
            <a href="#" class="nav-item" data-view="library">
                <span class="nav-icon">📚</span>
                <span class="nav-label">Library</span>
            </a>
            <a href="#" class="nav-item" data-view="settings">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">Settings</span>
            </a>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Modal</h2>
                <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
            </div>
            <div id="modal-content" class="modal-content">
                <!-- Modal content rendered here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/views.js"></script>
    <script src="js/invoices.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
